<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Monuments Page</title>
        <script src="load.js" defer></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Monuments Page</h1>

        <form id="monument-form">
            <label for="name">Name</label>
            <input type="text" id="name" name="name">

            <label for="yearCompleted">Year Completed</label>
            <input type="number" id="yearCompleted" name="yearCompleted">

            <label for="type">Type</label>
            <input type="text" id="type" name="type">

            <label for="heightFeet">Height (Feet)</label>
            <input type="number" id="heightFeet" name="heightFeet">

            <label for="theme">Theme</label>
            <input type="text" id="theme" name="theme">

            <button type="submit">Add</button>
        </form>

        <section id="monuments-grid">
            <!-- we will load our elements in from the fetch() call (from the web API)-->
        </section>
    </body>
</html>
